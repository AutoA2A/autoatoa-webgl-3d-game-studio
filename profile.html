<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <style>
        :root{
            --primary:#1a1a2e;
            --secondary:#16213e;
            --accent:#0f3460;
            --font-family:"Segoe UI",sans-serif;
            --radius:8px;
            --gap:16px;
            --shadow:0 4px 6px rgba(0,0,0,0.3);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:var(--font-family);
            background:#f5f5f5;
            color:#fff;
            line-height:1.5;
        }
        a{
            color:inherit;
            text-decoration:none;
        }
        header{
            background:var(--primary);
            padding:var(--gap);
        }
        .nav{
            display:flex;
            flex-wrap:wrap;
            gap:var(--gap);
            justify-content:center;
        }
        .nav a{
            padding:8px 12px;
            background:var(--secondary);
            border-radius:var(--radius);
            transition:background .3s;
        }
        .nav a:hover{
            background:var(--accent);
        }
        .container{
            max-width:1200px;
            margin:var(--gap) auto;
            padding:var(--gap);
            background:#fff;
            color:#333;
            border-radius:var(--radius);
            box-shadow:var(--shadow);
        }
        @media (max-width:600px){
            .nav{
                flex-direction:column;
                align-items:center;
            }
        }
    </style>

        <nav class="nav">
            <a href="index.html">首页</a>

    <main class="container">
        
<section class="section" style="margin-bottom:var(--gap);">
    <h2 style="margin-bottom:var(--gap);border-left:4px solid var(--accent);padding-left:8px;">用户存档管理</h2>
    <div class="section-content" style="display:flex;flex-wrap:wrap;gap:var(--gap);">
        <div style="flex:1 1 300px;background:var(--secondary);color:#fff;padding:var(--gap);border-radius:var(--radius);box-shadow:var(--shadow);">
            <h3 style="margin-bottom:8px;">本地存档</h3>
            <ul id="saveList" class="list" style="list-style:none;padding-left:0;margin-bottom:var(--gap);">
                <!-- 动态填充 -->
            </ul>
            <button id="newSaveBtn" class="btn" style="display:inline-block;padding:8px 20px;background:var(--accent);color:#fff;border-radius:var(--radius);box-shadow:var(--shadow);transition:background .3s;">新建存档</button>
        </div>
    </div>
</section>

<section class="section" style="margin-bottom:var(--gap);">
    <h2 style="margin-bottom:var(--gap);border-left:4px solid var(--accent);padding-left:8px;">我的项目列表</h2>
    <div class="section-content" style="display:flex;flex-wrap:wrap;gap:var(--gap);">
        <div style="flex:1 1 300px;background:var(--secondary);color:#fff;padding:var(--gap);border-radius:var(--radius);box-shadow:var(--shadow);">
            <h3 style="margin-bottom:8px;">已创建项目</h3>
            <ul id="projectList" class="list" style="list-style:none;padding-left:0;margin-bottom:var(--gap);">
                <!-- 动态填充 -->
            </ul>
            <button id="newProjectBtn" class="btn" style="display:inline-block;padding:8px 20px;background:var(--accent);color:#fff;border-radius:var(--radius);box-shadow:var(--shadow);transition:background .3s;">创建新项目</button>
        </div>
    </div>
</section>

<section class="section" style="margin-bottom:var(--gap);">
    <h2 style="margin-bottom:var(--gap);border-left:4px solid var(--accent);padding-left:8px;">成就展示</h2>
    <div class="section-content" style="display:flex;flex-wrap:wrap;gap:var(--gap);">
        <div id="achievementContainer" style="flex:1 1 300px;background:var(--secondary);color:#fff;padding:var(--gap);border-radius:var(--radius);box-shadow:var(--shadow);">
            <!-- 动态填充 -->
        </div>
    </div>
</section>

<script>
(() => {
    const saveKey = 'wgf_saves';
    const projectKey = 'wgf_projects';

    // ---------- 本地存档 ----------
    function loadSaves() {
        const data = JSON.parse(localStorage.getItem(saveKey) || '[]');
        const ul = document.getElementById('saveList');
        ul.innerHTML = '';
        data.forEach((item, idx) => {
            const li = document.createElement('li');
            li.style.background = 'var(--secondary)';
            li.style.color = '#fff';
            li.style.padding = 'var(--gap)';
            li.style.borderRadius = 'var(--radius)';
            li.style.boxShadow = 'var(--shadow)';
            li.style.marginBottom = '8px';
            li.textContent = item.name + '（' + new Date(item.time).toLocaleString() + '）';
            const del = document.createElement('button');
            del.textContent = '删除';
            del.style.marginLeft = '8px';
            del.style.padding = '4px 8px';
            del.style.background = 'var(--accent)';
            del.style.border = 'none';
            del.style.borderRadius = 'var(--radius)';
            del.style.color = '#fff';
            del.onclick = () => {
                data.splice(idx,1);
                localStorage.setItem(saveKey, JSON.stringify(data));
                loadSaves();
                updateAchievements();
            };
            li.appendChild(del);
            ul.appendChild(li);
        });
    }

    document.getElementById('newSaveBtn').onclick = () => {
        const name = prompt('请输入存档名称：');
        if (!name) return;
        const data = JSON.parse(localStorage.getItem(saveKey) || '[]');
        data.push({name, time: Date.now()});
        localStorage.setItem(saveKey, JSON.stringify(data));
        loadSaves();
        updateAchievements();
    };

    // ---------- 项目列表 ----------
    function loadProjects() {
        const data = JSON.parse(localStorage.getItem(projectKey) || '[]');
        const ul = document.getElementById('projectList');
        ul.innerHTML = '';
        data.forEach((proj, idx) => {
            const li = document.createElement('li');
            li.style.background = 'var(--secondary)';
            li.style.color = '#fff';
            li.style.padding = 'var(--gap)';
            li.style.borderRadius = 'var(--radius)';
            li.style.boxShadow = 'var(--shadow)';
            li.style.marginBottom = '8px';
            li.textContent = proj.title;
            const open = document.createElement('button');
            open.textContent = '打开';
            open.style.marginLeft = '8px';
            open.style.padding = '4px 8px';
            open.style.background = 'var(--accent)';
            open.style.border = 'none';
            open.style.borderRadius = 'var(--radius)';
            open.style.color = '#fff';
            open.onclick = () => {
                // 跳转到编辑器并传递项目 ID（使用 URL 参数）
                location.href = `editor.html?proj=${encodeURIComponent(proj.id)}`;
            };
            const del = document.createElement('button');
            del.textContent = '删除';
            del.style.marginLeft = '4px';
            del.style.padding = '4px 8px';
            del.style.background = '#c00';
            del.style.border = 'none';
            del.style.borderRadius = 'var(--radius)';
            del.style.color = '#fff';
            del.onclick = () => {
                data.splice(idx,1);
                localStorage.setItem(projectKey, JSON.stringify(data));
                loadProjects();
                updateAchievements();
            };
            li.appendChild(open);
            li.appendChild(del);
            ul.appendChild(li);
        });
    }

    document.getElementById('newProjectBtn').onclick = () => {
        const title = prompt('请输入项目标题：');
        if (!title) return;
        const data = JSON.parse(localStorage.getItem(projectKey) || '[]');
        const id = 'proj_' + Date.now();
        data.push({id, title, created: Date.now()});
        localStorage.setItem(projectKey, JSON.stringify(data));
        loadProjects();
        updateAchievements();
    };

    // ---------- 成就 ----------
    const achievements = [
        {id:1, name:'首次存档', condition: d => d.saves.length >= 1},
        {id:2, name:'存档达人（5个）', condition: d => d.saves.length >= 5},
        {id:3, name:'项目新手（1个）', condition: d => d.projects.length >= 1},
        {id:4, name:'项目大师（10个）', condition: d => d.projects.length >= 10}
    ];

    function updateAchievements() {
        const saves = JSON.parse(localStorage.getItem(saveKey) || '[]');
        const projects = JSON.parse(localStorage.getItem(projectKey) || '[]');
        const container = document.getElementById('achievementContainer');
        container.innerHTML = '';
        achievements.forEach(a => {
            const earned = a.condition({saves, projects});
            const card = document.createElement('article');
            card.className = 'card';
            card.style.background = earned ? 'var(--accent)' : 'var(--secondary)';
            card.style.color = '#fff';
            card.style.padding = 'var(--gap)';
            card.style.borderRadius = 'var(--radius)';
            card.style.boxShadow = 'var(--shadow)';
            card.style.marginBottom = 'var(--gap)';
            const title = document.createElement('h3');
            title.textContent = a.name;
            const status = document.createElement('p');
            status.textContent = earned ? '已获得' : '未达成';
            card.appendChild(title);
            card.appendChild(status);
            container.appendChild(card);
        });
    }

    // 初始化
    loadSaves();
    loadProjects();
    updateAchievements();
})();
</script>
