        .nav a{

            max-width:1200px;

            background:#fff;
            color:#333;
            border-radius:var(--radius);
            box-shadow:var(--shadow);
        }
        @media (max-width:600px){
            .nav{
                flex-direction:column;
                align-items:center;
            }
        }
